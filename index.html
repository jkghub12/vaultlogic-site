<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <meta property="og:title" content="VaultLogic" />
    <meta property="og:description" content="AI-Driven Onchain Intelligence for the $BNKR Ecosystem" />
    <meta property="og:image" content="https://vaultlogic.dev/opengraph-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>VaultLogic | AI-Driven Onchain Intelligence</title>
    <style>
        /* Base Styles */
        body { 
            background-color: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; /* Changed from height to min-height */
            margin: 0; 
            overflow: hidden;
            font-size: 18px; /* Slightly larger base font for clarity */
        }

        .container { 
            text-align: center; 
            border: 1px solid #00ff41; 
            padding: 2.5rem; /* Using rem for scaling */
            box-shadow: 0 0 20px #00ff4133; 
            width: 90%; 
            max-width: 600px; /* Limits width on huge screens */
        }

        /* Responsive Logo */
        .logo-box {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        
        .logo-box img {
            width: 180px; /* Slightly larger logo */
            height: auto;
            border: 1px solid #00ff41;
            padding: 10px;
            box-shadow: 0 0 15px #00ff4144;
        }

        /* Typography */
        h1 { 
            font-size: 2.5rem; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin-bottom: 0.5rem; 
        }

        p { 
            color: #888; 
            margin-bottom: 2rem; 
            font-size: 1rem;
            line-height: 1.4;
        }

        .status { 
            font-size: 1.1rem; 
            color: #00ff41; 
            text-transform: uppercase; 
            animation: blink 1.5s infinite; 
            margin-bottom: 2rem;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .links { margin-top: 1rem; }

        a { 
            color: #00ff41; 
            text-decoration: none; 
            border: 1px solid #00ff41; 
            padding: 10px 25px; 
            transition: 0.3s; 
            font-weight: bold;
            display: inline-block;
        }

        a:hover { background: #00ff41; color: #0a0a0a; }

        /* Media Query for smaller screens (Mobile) */
        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 1.5rem; }
            .logo-box img { width: 130px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <img src="opengraph-image.png" alt="VaultLogic Logo">
        </div>

        <h1>VaultLogic</h1>
        <p>AI-DRIVEN ONCHAIN INTELLIGENCE FOR THE $BNKR ECOSYSTEM</p>
        
        <div class="status">> INITIALIZING AGENT: vaultlogic.base...</div>
        
        <div class="links">
            <a href="#">SYSTEM STATUS: ONLINE</a>
        </div>
    </div>
</body>
</html>
